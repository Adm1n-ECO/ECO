<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="theme.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ECO · Network Map</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="eco-client.js"></script>
<script>
(function authGuard(){
  function check(){
    if(!window.ecoSB){setTimeout(check,50);return;}
    window.ecoSB.auth.getSession().then(({data:{session}})=>{
      if(!session) window.location.href='enter.html?next=network-map.html';
    });
  }
  check();
})();
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:var(--color-bg);color:var(--color-text);min-height:100vh;}

/* ── Layout ── */
.page{padding:72px 0 0;display:flex;flex-direction:column;height:100vh;}
.map-header{padding:14px 20px 10px;flex-shrink:0;}
.map-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.map-title{font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:1.1rem;color:var(--color-text);}
.map-count{font-size:12px;color:var(--color-text-dim);}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06);}
.filter-sep{width:1px;height:20px;background:rgba(255,255,255,.10);flex-shrink:0;}
.filter-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim);white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--color-text-dim);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:Arial,sans-serif;}
.chip:hover{border-color:rgba(0,170,255,.4);color:var(--color-text);}
.chip.active{background:rgba(0,170,255,.15);border-color:#00AAFF;color:#fff;}
.chip.mine{background:rgba(0,204,68,.12);border-color:rgba(0,204,68,.4);color:#00CC44;}
.chip.mine.active{background:rgba(0,204,68,.22);border-color:#00CC44;}

/* ── Map ── */
.map-wrap{flex:1;position:relative;min-height:0;}
#network-map{width:100%;height:100%;}

/* ── Leaflet overrides ── */
.leaflet-container{background:#060c12;}
.leaflet-tile{filter:brightness(.75) saturate(.6);}
.leaflet-popup-content-wrapper{background:#0D1820;border:1px solid rgba(0,170,255,.25);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);color:#E8F4F0;}
.leaflet-popup-tip{background:#0D1820;}
.leaflet-popup-content{margin:12px 16px;font-size:13px;line-height:1.55;}
.pop-name{font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:.95rem;color:#E8F4F0;margin-bottom:2px;}
.pop-by{font-size:11px;color:#5A8A80;margin-bottom:6px;}
.pop-comment{font-size:12px;color:#C8D4D0;line-height:1.6;}
.pop-cat{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#00AAFF;margin-top:6px;}

/* ── Stats sidebar ── */
.map-stats{position:absolute;top:12px;right:12px;z-index:900;background:rgba(7,13,20,.88);border:1px solid rgba(0,170,255,.18);border-radius:12px;padding:12px 16px;min-width:140px;backdrop-filter:blur(8px);}
.stat-row{font-size:11px;color:#5A8A80;margin-bottom:4px;}
.stat-row strong{color:#E8F4F0;font-size:13px;}
.stat-divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:8px 0;}
.stat-contrib{font-size:11px;color:#3A5A54;margin-bottom:3px;}
.stat-contrib .sc-name{color:#C8D4D0;}
.stat-contrib .sc-count{color:#00AAFF;float:right;}
.add-pin-btn{display:block;width:100%;margin-top:10px;background:rgba(0,170,255,.12);border:1px solid rgba(0,170,255,.3);color:#00AAFF;border-radius:8px;padding:7px 0;font-size:11px;font-weight:700;font-family:'Arial Black',Arial,sans-serif;cursor:pointer;text-align:center;text-decoration:none;transition:background .15s;}
.add-pin-btn:hover{background:rgba(0,170,255,.22);}

/* ── Empty state ── */
.empty-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:800;}
.empty-msg{background:rgba(7,13,20,.85);border:1px solid rgba(0,170,255,.18);border-radius:12px;padding:20px 28px;text-align:center;}
.empty-msg p{font-size:13px;color:#5A8A80;margin-bottom:12px;}
.empty-msg a{color:#00AAFF;font-size:12px;font-weight:700;pointer-events:all;}
</style>
</head>
<body>
<div id="eco-header"></div>

<div class="page">
  <div class="map-header">
    <div class="map-title-row">
      <div class="map-title">Network Map</div>
      <div class="map-count" id="map-count">Loading…</div>
    </div>
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">Show</span>
      <button class="chip active" id="chip-all" onclick="setMemberFilter('all',this)">Everyone</button>
      <button class="chip mine" id="chip-mine" onclick="setMemberFilter('mine',this)">My pins</button>
      <div class="filter-sep"></div>
      <span class="filter-label">Category</span>
      <div id="cat-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="network-map"></div>

    <!-- Stats panel -->
    <div class="map-stats" id="map-stats" style="display:none;">
      <div class="stat-row"><strong id="stat-visible">0</strong> pins visible</div>
      <div class="stat-row" id="stat-members-row"></div>
      <hr class="stat-divider">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5A54;margin-bottom:6px;">Top pinners</div>
      <div id="stat-contribs"></div>
      <a class="add-pin-btn" href="map-pins.html">+ Add my pins</a>
    </div>

    <div class="empty-overlay" id="empty-overlay" style="display:none;">
      <div class="empty-msg">
        <p>No pins yet from your network.<br>Be the first to add places.</p>
        <a href="map-pins.html">Add pins →</a>
      </div>
    </div>
  </div>
</div>

<script src="header.js"></script>
<script>
const sb = window.ecoSB;

const CAT = {
  ancestral_village:  { emoji:'🏡', color:'#F39C12', label:'Ancestral Village' },
  migration_route:    { emoji:'🛤',  color:'#00DDFF', label:'Migration Route' },
  sacred_site:        { emoji:'🌙', color:'#9B59B6', label:'Sacred Site' },
  cultural_landmark:  { emoji:'🏛',  color:'#00CC44', label:'Cultural Landmark' },
  heritage_site:      { emoji:'⬡',  color:'#E67E22', label:'Heritage Site' },
  burial_ground:      { emoji:'☽',  color:'#8E44AD', label:'Burial Ground' },
  general:            { emoji:'📍', color:'#00AAFF', label:'General' }
};

let _map, _allPins=[], _myId=null;
let _activeMember='all', _activeCats=new Set(); // empty = all cats

/* ── SVG marker factory ─────────────────────────────────── */
function makeIcon(color, emoji) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.5)"/></filter>
    <path d="M16 0C9.37 0 4 5.37 4 12c0 9 12 28 12 28S28 21 28 12C28 5.37 22.63 0 16 0z" fill="${color}" filter="url(#s)" opacity=".92"/>
    <circle cx="16" cy="12" r="7" fill="rgba(0,0,0,.25)"/>
    <text x="16" y="16" text-anchor="middle" font-size="10">${emoji}</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [32,40], iconAnchor: [16,40], popupAnchor: [0,-40],
    className: ''
  });
}

/* ── Build popup HTML ───────────────────────────────────── */
function popupHtml(p) {
  const c  = CAT[p.pin_category||'general'] || CAT.general;
  const by = p.created_by === _myId ? 'You' : (p.created_by_name || 'A member');
  return `<div class="pop-name">${p.location_name||'Unnamed place'}</div>
    <div class="pop-by">Pinned by ${by}</div>
    ${p.comment ? `<div class="pop-comment">${p.comment}</div>` : ''}
    <div class="pop-cat">${c.emoji} ${c.label}</div>`;
}

/* ── Render visible pins ────────────────────────────────── */
let _layerGroup;
function renderPins() {
  _layerGroup.clearLayers();

  const visible = _allPins.filter(p => {
    const memberOk = _activeMember==='all' || (_activeMember==='mine' && p.created_by===_myId);
    const catKey   = p.pin_category||'general';
    const catOk    = _activeCats.size===0 || _activeCats.has(catKey);
    return memberOk && catOk && p.lat && p.lon;
  });

  visible.forEach(p => {
    const c   = CAT[p.pin_category||'general'] || CAT.general;
    const mk  = L.marker([p.lat, p.lon], { icon: makeIcon(c.color, c.emoji) });
    mk.bindPopup(popupHtml(p), { maxWidth: 240 });
    _layerGroup.addLayer(mk);
  });

  // Update count
  document.getElementById('map-count').textContent =
    `${visible.length} pin${visible.length!==1?'s':''} · ${new Set(_allPins.map(p=>p.created_by)).size} members`;

  document.getElementById('stat-visible').textContent = visible.length;

  // Fit bounds
  if (visible.length) {
    _map.fitBounds(_layerGroup.getBounds().pad(.15), { maxZoom: 10 });
  }

  document.getElementById('map-stats').style.display = _allPins.length ? 'block' : 'none';
  document.getElementById('empty-overlay').style.display = _allPins.length ? 'none' : 'flex';
}

/* ── Member filter ──────────────────────────────────────── */
function setMemberFilter(val, btn) {
  _activeMember = val;
  document.querySelectorAll('#chip-all,#chip-mine').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderPins();
}

/* ── Category filter ────────────────────────────────────── */
function toggleCat(key, btn) {
  if (_activeCats.has(key)) { _activeCats.delete(key); btn.classList.remove('active'); }
  else                       { _activeCats.add(key);   btn.classList.add('active'); }
  renderPins();
}

/* ── Build category chips from data ────────────────────── */
function buildCatChips(pins) {
  const used = [...new Set(pins.map(p=>p.pin_category||'general'))];
  const wrap = document.getElementById('cat-chips');
  used.forEach(key => {
    const c = CAT[key]||CAT.general;
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = `${c.emoji} ${c.label}`;
    btn.onclick = function(){ toggleCat(key, this); };
    wrap.appendChild(btn);
  });
}

/* ── Top contributors ───────────────────────────────────── */
function buildContribs(pins) {
  const counts = {};
  const names  = {};
  pins.forEach(p => {
    counts[p.created_by] = (counts[p.created_by]||0) + 1;
    names[p.created_by]  = p.created_by === _myId ? 'You' : (p.created_by_name || p.created_by);
  });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const el  = document.getElementById('stat-contribs');
  el.innerHTML = top.map(([id, n]) =>
    `<div class="stat-contrib"><span class="sc-name">${names[id]}</span><span class="sc-count">${n}</span></div>`
  ).join('');
  const memberCount = Object.keys(counts).length;
  document.getElementById('stat-members-row').innerHTML =
    `<strong>${memberCount}</strong> member${memberCount!==1?'s':''} contributing`;
}

/* ── Load ───────────────────────────────────────────────── */
async function load() {
  // Map init
  _map = L.map('network-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_map);
  _layerGroup = L.layerGroup().addTo(_map);
  _map.setView([20, 0], 2);

  // Get current user
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    const { data: me } = await sb.from('users').select('user_id').eq('auth_id', session.user.id).maybeSingle();
    _myId = me?.user_id || null;
  }

  // Load all network pins (excluding keeper-only unless user is Keeper/Admin)
  const { data: pins } = await sb.from('map_pins')
    .select('id,created_by,created_by_name,location_name,lat,lon,comment,pin_category,is_keeper_only,created_at')
    .eq('network_id','lightning-001')
    .eq('is_keeper_only', false)
    .not('lat','is',null)
    .order('created_at',{ascending:false})
    .limit(500);

  _allPins = pins || [];

  if (_allPins.length) {
    buildCatChips(_allPins);
    buildContribs(_allPins);
  }
  renderPins();
}

(function waitAndLoad(){
  if(!window.ecoSB){ setTimeout(waitAndLoad,50); return; }
  load().catch(console.error);
})();
</script>
</body>
</html>
