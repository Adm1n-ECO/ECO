<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECO Deploy Test</title>
<style>
  body { background:#080D14; color:#fff; font-family:Arial,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; flex-direction:column; gap:16px; }
  .e { color:#00AAFF; } .c { color:#00CC44; } .o { color:#fff; }
  h1 { font-family:'Arial Black',Arial,sans-serif; font-size:2rem; margin:0; }
  .box { background:#0D1420; border:1px solid #00CC44; border-radius:8px; padding:20px 32px; text-align:center; }
  .label { font-size:11px; letter-spacing:.12em; color:#3A5A54; text-transform:uppercase; margin-bottom:6px; }
  .val { font-size:14px; color:#00CC44; }
  .ts { font-size:12px; color:#4a5568; margin-top:8px; }
</style>
</head>
<body>
  <h1><span class="e">E</span><span class="c">C</span><span class="o">O</span></h1>
  <div class="box">
    <div class="label">Auto-Deploy Status</div>
    <div class="val">✅ GitHub → Namecheap pipeline working</div>
    <div class="ts">Deployed: <span id="ts"></span></div>
    <div class="ts">File: deploy-test.html</div>
  </div>
  <script>
    document.getElementById('ts').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
