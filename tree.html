<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:Arial,Helvetica,sans-serif;background:#080D14;color:#E8F4F0;-webkit-font-smoothing:antialiased;}

.nav{background:#0D1820;border-bottom:1px solid rgba(0,170,255,.10);height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;position:relative;z-index:300;flex-shrink:0;}
.nav-wordmark{font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:1rem;letter-spacing:.06em;text-decoration:none;}
.nav-e{color:#00AAFF;}.nav-c{color:#00CC44;}.nav-o{color:#FFF;}
.nav-sep{width:1px;height:20px;background:rgba(0,170,255,.10);margin:0 4px;}
.nav-link{font-size:12px;color:#3A5A54;text-decoration:none;padding:4px 8px;border-radius:6px;transition:color .12s;}
.nav-link:hover{color:#00AAFF;}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-badge{background:rgba(0,170,255,.10);border:1px solid rgba(0,170,255,.18);color:#3A5A54;font-size: 12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:999px;}

.shell{display:flex;height:calc(100vh - 52px);}

/* Segment sidebar */
.seg-sidebar{width:200px;flex-shrink:0;background:#0A1520;border-right:1px solid rgba(0,170,255,.08);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;}
.seg-sidebar.collapsed{width:40px;}
.seg-header{padding:12px 12px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,170,255,.07);flex-shrink:0;}
.seg-title{font-size: 12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#3A5A54;white-space:nowrap;overflow:hidden;}
.seg-collapse{width:22px;height:22px;background:transparent;border:1px solid rgba(0,170,255,.12);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#3A5A54;font-size: 12px;}
.seg-collapse:hover{border-color:rgba(0,170,255,.30);color:#00AAFF;}
.seg-body{flex:1;overflow-y:auto;padding:8px 0;}
.seg-body::-webkit-scrollbar{width:3px;}
.seg-body::-webkit-scrollbar-thumb{background:rgba(0,170,255,.15);border-radius:99px;}
.seg-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;transition:background .12s;}
.seg-item:hover{background:rgba(0,170,255,.05);}
.seg-item.off .seg-dot{opacity:.25;}
.seg-item.off .seg-label{color:#3A5A54;}
.seg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.seg-label{font-size: 12px;color:#C8D4D0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-transform:capitalize;}
.seg-count{font-size: 12px;color:#3A5A54;flex-shrink:0;}
.seg-toggle{width:26px;height:14px;background:rgba(0,170,255,.12);border-radius:999px;position:relative;flex-shrink:0;transition:background .14s;}
.seg-item:not(.off) .seg-toggle{background:rgba(0,170,255,.35);}
.seg-toggle::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#00AAFF;transition:transform .14s;}
.seg-item.off .seg-toggle::after{transform:none;background:#3A5A54;}
.seg-item:not(.off) .seg-toggle::after{transform:translateX(12px);}
.collapsed .seg-title,.collapsed .seg-label,.collapsed .seg-count,.collapsed .seg-toggle,.collapsed .seg-quick{display:none;}
.collapsed .seg-item{justify-content:center;padding:7px 0;}
.collapsed .seg-header{justify-content:center;padding:12px 0 8px;}
.seg-quick{display:flex;gap:4px;padding:0 12px 8px;}
.seg-qbtn{font-size: 12px;color:#3A5A54;background:transparent;border:1px solid rgba(0,170,255,.10);border-radius:4px;padding:2px 7px;cursor:pointer;transition:all .12s;}
.seg-qbtn:hover{color:#00AAFF;border-color:rgba(0,170,255,.25);}

/* Canvas */
.tree-canvas{flex:1;position:relative;overflow:hidden;}
#tree-svg{width:100%;height:100%;cursor:grab;}
#tree-svg:active{cursor:grabbing;}

/* D3 styles */
.node-ring{transition:r .15s;}
.node-group{cursor:pointer;}
.node-group.dim{opacity:.08;}
.node-group.selected .node-ring{stroke-width:3px !important;}
.node-label{font-family:'Arial Black',Arial,sans-serif;font-weight:700;font-size:15px;fill:#E8F4F0;text-anchor:middle;}
.node-sublabel{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#5A8A80;text-anchor:middle;}
.link{transition:opacity .15s;opacity:.55;}
.link.dim{opacity:.04;}
.link.highlight{stroke-width:3px !important;opacity:1 !important;}

/* Tooltip */
.tooltip{position:absolute;background:#0D1820;border:1px solid rgba(0,170,255,.20);border-radius:8px;padding:10px 13px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;min-width:160px;}
.tt-name{font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:12px;color:#E8F4F0;margin-bottom:2px;}
.tt-loc{font-size: 12px;color:#5A8A80;}

/* Stats bar */
.stats-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;background:#0D1820;border:1px solid rgba(0,170,255,.10);border-radius:10px;padding:8px 16px;}
.sb-item{text-align:center;}
.sb-num{font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:1rem;color:#00AAFF;}
.sb-label{font-size: 12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#3A5A54;}

/* Zoom controls */
.zoom-controls{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:6px;}
.zc-btn{width:30px;height:30px;background:#0D1820;border:1px solid rgba(0,170,255,.14);border-radius:6px;cursor:pointer;color:#5A8A80;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.zc-btn:hover{border-color:rgba(0,170,255,.35);color:#00AAFF;}

/* Detail panel */
.detail-panel{position:absolute;right:0;top:0;bottom:0;width:280px;background:#0D1820;border-left:1px solid rgba(0,170,255,.10);transform:translateX(100%);transition:transform .22s;overflow-y:auto;display:flex;flex-direction:column;}
.detail-panel.open{transform:translateX(0);}
.dp-head{padding:16px;border-bottom:1px solid rgba(0,170,255,.08);}
.dp-close{position:absolute;top:12px;right:12px;width:24px;height:24px;background:transparent;border:1px solid rgba(0,170,255,.12);border-radius:5px;cursor:pointer;color:#3A5A54;font-size:12px;display:flex;align-items:center;justify-content:center;}
.dp-close:hover{color:#00AAFF;border-color:rgba(0,170,255,.3);}
.dp-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#080D14;margin-bottom:10px;}
.dp-name{font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:.95rem;color:#E8F4F0;margin-bottom:4px;}
.dp-loc{font-size: 12px;color:#5A8A80;margin-bottom:6px;}
.dp-status{display:inline-block;font-size: 12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:rgba(0,170,255,.08);color:#3A5A54;border:1px solid rgba(0,170,255,.12);}
.dp-body{padding:16px;flex:1;}
.dp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,170,255,.06);}
.dp-row:last-child{border-bottom:none;}
.dp-key{font-size: 12px;color:#5A8A80;}
.dp-val{font-size: 12px;color:#C8D4D0;}
.dp-section{font-size: 12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#3A5A54;margin:14px 0 8px;}

.loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#080D14;z-index:200;}
.loading-text{color:#3A5A54;font-size:13px;font-family:Arial,Helvetica,sans-serif;}
</style>

<body>
<div id="eco-header"></div>



<div class="shell">
  <!-- Segment sidebar -->
  <div class="seg-sidebar" id="segSidebar">
    <div class="seg-header">
      <span class="seg-title">Relationship types</span>
      <button class="seg-collapse" onclick="toggleSidebar()">◀</button>
    </div>
    <div class="seg-quick">
      <button class="seg-qbtn" onclick="allSegs(true)">All</button>
      <button class="seg-qbtn" onclick="allSegs(false)">None</button>
    </div>
    <div class="seg-body" id="seg-list"></div>
  </div>

  <!-- Main canvas -->
  <div class="tree-canvas" id="treeCanvas">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-text">Loading network…</div>
    </div>

    <svg id="tree-svg"></svg>

    <div class="tooltip" id="tooltip">
      <div class="tt-name" id="tt-name">–</div>
      <div class="tt-loc"  id="tt-loc">–</div>
    </div>

    <div class="zoom-controls">
      <button class="zc-btn" onclick="zoomIn()">+</button>
      <button class="zc-btn" onclick="zoomOut()">−</button>
      <button class="zc-btn" id="photo-toggle-btn" onclick="togglePhotoMode()" title="Toggle photos/initials" style="font-size:11px;">👤</button>
      <button class="zc-btn" onclick="fitView()" title="Fit all nodes" style="font-size:11px;">⊡</button>
      <button class="zc-btn" onclick="fitView()" title="Fit">⊞</button>
    </div>

    <div class="stats-bar">
      <div class="sb-item"><div class="sb-num" id="sb-members">–</div><div class="sb-label">Members</div></div>
      <div class="sb-item"><div class="sb-num" id="sb-links">–</div><div class="sb-label">Links</div></div>
      <div class="sb-item"><div class="sb-num" id="sb-locs">–</div><div class="sb-label">Locations</div></div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <button class="dp-close" onclick="closePanel()">✕</button>
      <div class="dp-head">
        <div class="dp-av" id="dp-av">VB</div>
        <div class="dp-name" id="dp-name">–</div>
        <div class="dp-loc" id="dp-loc">–</div>
        <span class="dp-status" id="dp-status">–</span>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </div>
  </div>
</div>

<script>
const AV_COLORS = ['#00AAFF','#00CC44','#9060E0','#E09040','#E05080','#40C080'];
const TYPE_COLORS = {
  parent:'#00AAFF', child:'#00AAFF', sibling:'#00CC44', spouse:'#9060E0',
  partner:'#9060E0', cousin:'#E09040', aunt:'#E09040', uncle:'#E09040',
  grandparent:'#00AAFF', grandchild:'#00AAFF', default:'#3A5A54'
};

const ini = n => n ? n.trim().split(/\s+/).map(p=>p[0]).join('').toUpperCase().slice(0,2) : '?';

let NODES = [], LINKS = [], SEGS = {}, activeSegs = new Set();
let svgG = null, simulation = null, svgZoom = null;

// ── LOAD ──────────────────────────────────────────────────────
const sb = window.ecoSB;  // shared client from eco-client.js

async function load() {
  // NOTE: adjust column names if relationships table differs
  const [mRes, rRes] = await Promise.all([
    sb.from('users').select('user_id,full_name,current_location,birth_mm_yyyy,status,photo_id').limit(200),
    sb.from('relationships').select('subject_id,target_id,relation_type').limit(1000)
  ]);

  const members = mRes.data || [];
  const rels    = rRes.data || [];

  // photo_id is a direct URL — no join needed
  const treeImgCache = {};
  members.forEach(m => {
    if (m.photo_id) {
      const img = new Image(); img.src = m.photo_id;
      treeImgCache[m.user_id] = img;
    }
  });

  // Build segment map from relationship types
  rels.forEach(r => {
    const t = (r.relation_type || 'other').toLowerCase();
    if (!SEGS[t]) SEGS[t] = { id:t, label:t, color: TYPE_COLORS[t] || TYPE_COLORS.default, count:0 };
    SEGS[t].count++;
  });
  Object.keys(SEGS).forEach(k => activeSegs.add(k));

  // Build D3 nodes
  const memberMap = {};
  NODES = members.map((m, i) => {
    const color = AV_COLORS[i % AV_COLORS.length];
    memberMap[m.user_id] = { ...m, color };
    return { id: m.user_id, name: m.full_name || 'Unknown', location: m.current_location || '', status: m.status || 'living', bYear: m.birth_mm_yyyy, color, _img: treeImgCache[m.user_id] || null };
  });

  // Build D3 links
  LINKS = rels.map(r => ({
    source: r.subject_id, target: r.target_id,
    type: (r.relation_type || 'other').toLowerCase()
  })).filter(l => memberMap[l.source] && memberMap[l.target]);

  // Stats
  const locs = new Set(members.map(m => m.current_location).filter(Boolean));
  document.getElementById('sb-members').textContent = members.length;
  document.getElementById('sb-links').textContent   = LINKS.length;
  document.getElementById('sb-locs').textContent    = locs.size;

  renderSegments();
  document.getElementById('loadingOverlay').style.display = 'none';
  buildGraph();
}

// ── SEGMENTS ─────────────────────────────────────────────────
function renderSegments() {
  const list = document.getElementById('seg-list');
  list.innerHTML = Object.values(SEGS).map(seg => {
    const on = activeSegs.has(seg.id);
    return `<div class="seg-item${on?'':' off'}" onclick="toggleSeg('${seg.id}')">
      <div class="seg-dot" style="background:${seg.color}"></div>
      <span class="seg-label">${seg.label}</span>
      <span class="seg-count">${seg.count}</span>
      <div class="seg-toggle"></div>
    </div>`;
  }).join('');
}

function toggleSeg(id) {
  activeSegs.has(id) ? activeSegs.delete(id) : activeSegs.add(id);
  renderSegments();
  updateVisibility();
}

function allSegs(on) {
  Object.keys(SEGS).forEach(k => on ? activeSegs.add(k) : activeSegs.delete(k));
  renderSegments();
  updateVisibility();
}

function toggleSidebar() {
  document.getElementById('segSidebar').classList.toggle('collapsed');
}

function updateVisibility() {
  if (!svgG) return;
  svgG.selectAll('.link').style('display', d => activeSegs.has(d.type) ? null : 'none');
}

// ── D3 GRAPH ─────────────────────────────────────────────────
function buildGraph() {
  const canvas = document.getElementById('treeCanvas');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const svg = d3.select('#tree-svg');
  svg.selectAll('*').remove();

  svgZoom = d3.zoom().scaleExtent([.05, 5]).on('zoom', e => { svgG.attr('transform', e.transform); });
  svg.call(svgZoom);
  svgG = svg.append('g');

  const defs = svg.append('defs');
  Object.entries(TYPE_COLORS).forEach(([type, color]) => {
    defs.append('marker').attr('id','arr-'+type)
      .attr('viewBox','0 -3 6 6').attr('refX',16).attr('refY',0)
      .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M0,-3L6,0L0,3').attr('fill',color).attr('opacity',.4);
  });

  const nodes = NODES.map(n => ({...n}));
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });
  const links = LINKS.map(l => ({...l, source: nodeMap[l.source] || l.source, target: nodeMap[l.target] || l.target}));

  simulation = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id).distance(140).strength(.3))
    .force('charge',  d3.forceManyBody().strength(-600))
    .force('collide', d3.forceCollide(40))
    .force('center',  d3.forceCenter(W/2, H/2))
    .alphaDecay(.025);

  const linkSel = svgG.append('g').selectAll('.link').data(links).enter()
    .append('path').attr('class','link')
    .attr('stroke', d => TYPE_COLORS[d.type] || TYPE_COLORS.default)
    .attr('stroke-width', 1.4)
    .attr('fill','none')
    .attr('marker-end', d => 'url(#arr-'+(d.type in TYPE_COLORS ? d.type : 'default')+')')
    .on('mouseover', function(){ d3.select(this).classed('highlight', true); })
    .on('mouseout',  function(){ d3.select(this).classed('highlight', false); });

  const nodeSel = svgG.append('g').selectAll('.node-group').data(nodes).enter()
    .append('g').attr('class','node-group')
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('click',      (e,d) => { e.stopPropagation(); openPanel(d); highlightNode(d); })
    .on('mouseover',  (e,d) => { showTip(e,d); })
    .on('mouseleave', ()   => { hideTip(); });

  // ClipPath defs for photo avatars
  // Move defs to root SVG so clipPaths work in all browsers
  const svgRoot = d3.select('#tree-svg');
  svgRoot.select('defs.photo-defs').remove();
  const photoDefs = svgRoot.insert('defs',':first-child').attr('class','photo-defs');
  nodes.forEach(d => {
    if (!d._img) return;
    photoDefs.append('clipPath').attr('id','tclip-'+d.id.replace(/[^a-z0-9]/gi,'_'))
      .append('circle').attr('cx',0).attr('cy',0).attr('r',16);
  });

  nodeSel.append('circle').attr('class','node-ring')
    .attr('r', 20)
    .attr('fill',   d => d.color + '20')
    .attr('stroke', d => d.color)
    .attr('stroke-width', 1.6);

  // Photo image (nodes that have a photo)
  nodeSel.filter(d => !!d._img)
    .append('image')
    .attr('href', d => d._img.src)
    .attr('x', -16).attr('y', -16)
    .attr('width', 32).attr('height', 32)
    .attr('preserveAspectRatio','xMidYMid slice')
    .attr('clip-path', d => 'url(#tclip-'+d.id.replace(/[^a-z0-9]/gi,'_')+')');

  // Ring over photo
  nodeSel.filter(d => !!d._img)
    .append('circle').attr('r',16)
    .attr('fill','none')
    .attr('stroke','rgba(255,255,255,.55)')
    .attr('stroke-width','1.5');

  // Initials for nodes without photo
  nodeSel.filter(d => !d._img)
    .append('text').attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('font-size','11px').attr('font-weight','700').attr('fill',d=>d.color)
    .text(d => ini(d.name));

  nodeSel.append('text').attr('class','node-label').attr('y', 28)
    .text(d => {
      if (!d.name) return '?';
      const parts = d.name.split(' ').filter(Boolean);
      return parts.length > 1 ? parts[0] + ' ' + parts[parts.length-1][0] + '.' : parts[0];
    });

  simulation.on('tick', () => {
    linkSel.attr('d', d => {
      const sx=d.source.x, sy=d.source.y, tx2=d.target.x, ty2=d.target.y;
      const mx=(sx+tx2)/2, my=(sy+ty2)/2;
      // Perpendicular offset for curve — proportional to link length
      const len=Math.sqrt((tx2-sx)**2+(ty2-sy)**2)||1;
      const offset=Math.min(len*0.25, 60);
      const nx=-(ty2-sy)/len*offset, ny=(tx2-sx)/len*offset;
      return `M${sx},${sy} Q${mx+nx},${my+ny} ${tx2},${ty2}`;
    });
    nodeSel.attr('transform', d => 'translate('+d.x+','+d.y+')');
  });

  svg.on('click', () => closePanel());
  updateVisibility();
}

// ── HIGHLIGHT ────────────────────────────────────────────────
function highlightNode(d) {
  if (!svgG) return;
  const conn = new Set([d.id]);
  svgG.selectAll('.link').each(l => { if(l.source.id===d.id||l.target.id===d.id){conn.add(l.source.id);conn.add(l.target.id);} });
  svgG.selectAll('.node-group').classed('dim', n => !conn.has(n.id));
  svgG.selectAll('.link').classed('dim', l => l.source.id!==d.id && l.target.id!==d.id);
}

// ── TOOLTIP ──────────────────────────────────────────────────
function showTip(event, d) {
  const canvas = document.getElementById('treeCanvas').getBoundingClientRect();
  document.getElementById('tt-name').textContent = d.name || 'Unknown';
  document.getElementById('tt-loc').textContent  = d.current_location || 'Location unknown' || 'Location unknown';
  const tt = document.getElementById('tooltip');
  tt.style.left = (event.clientX - canvas.left + 14) + 'px';
  tt.style.top  = (event.clientY - canvas.top  - 10) + 'px';
  tt.style.opacity = '1';
}
function hideTip() { document.getElementById('tooltip').style.opacity = '0'; }

// ── PANEL ────────────────────────────────────────────────────
function openPanel(d) {
  const colors = ['#00AAFF','#00CC44','#9060E0','#E09040'];
  const c = d.color || colors[0];
  document.getElementById('dp-av').style.background = c + '25';
  document.getElementById('dp-av').style.border = '1.5px solid ' + c + '55';
  document.getElementById('dp-av').style.color = c;
  document.getElementById('dp-av').textContent = ini(d.name);
  document.getElementById('dp-name').textContent   = d.name || 'Unknown';
  document.getElementById('dp-loc').textContent    = d.current_location || 'Location unknown' || 'Location unknown';
  document.getElementById('dp-status').textContent = d.status || 'living';

  const rels = LINKS.filter(l => l.source.id === d.id || l.target.id === d.id);
  const relMap = {};
  rels.forEach(l => {
    const other = l.source.id === d.id ? l.target : l.source;
    if (!relMap[l.type]) relMap[l.type] = [];
    relMap[l.type].push(other.name || 'Unknown');
  });

  let html = '';
  if (d.birth_mm_yyyy) html += `<div class="dp-row"><span class="dp-key">Birth year</span><span class="dp-val">${d.birth_mm_yyyy}</span></div>`;
  if (Object.keys(relMap).length) {
    html += '<div class="dp-section">Connections</div>';
    Object.entries(relMap).forEach(([type, names]) => {
      html += `<div class="dp-row"><span class="dp-key" style="text-transform:capitalize">${type}</span><span class="dp-val">${names.slice(0,2).join(', ')}${names.length>2?' +more':''}</span></div>`;
    });
  }
  document.getElementById('dp-body').innerHTML = html || '<div style="font-size:12px;color:#3A5A54;">No additional data.</div>';
  document.getElementById('detailPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  if (svgG) { svgG.selectAll('.node-group').classed('dim', false); svgG.selectAll('.link').classed('dim', false); updateVisibility(); }
}

// ── PHOTO TOGGLE ───────────────────────────────────────────────
let _showPhotos = true;
function togglePhotoMode() {
  _showPhotos = !_showPhotos;
  document.getElementById('photo-toggle-btn').style.opacity = _showPhotos ? '1' : '.4';
  // Show/hide photo images and rings, show/hide initials text
  document.querySelectorAll('.node-group image').forEach(el => { el.style.display = _showPhotos ? '' : 'none'; });
  document.querySelectorAll('.node-group circle:not(.node-ring)').forEach(el => { el.style.display = _showPhotos ? '' : 'none'; });
  // Toggle initials visibility
  if (svgG) buildGraph();
}

// ── ZOOM ─────────────────────────────────────────────────────
function zoomIn()  { d3.select('#tree-svg').transition().duration(200).call(svgZoom.scaleBy, 1.3); }
function zoomOut() { d3.select('#tree-svg').transition().duration(200).call(svgZoom.scaleBy, .77); }
function fitView() {
  if (!NODES.length) return;
  const canvas = document.getElementById('treeCanvas');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const xs = NODES.map(n=>n.x).filter(Boolean), ys = NODES.map(n=>n.y).filter(Boolean);
  if (!xs.length) return;
  const x0=Math.min(...xs)-40, x1=Math.max(...xs)+40, y0=Math.min(...ys)-40, y1=Math.max(...ys)+40;
  const scale = Math.min(.95, Math.min(W/(x1-x0), H/(y1-y0)));
  const tx = W/2 - scale*(x0+x1)/2, ty = H/2 - scale*(y0+y1)/2;
  d3.select('#tree-svg').transition().duration(500)
    .call(svgZoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

window.addEventListener('resize', buildGraph);
(function waitAndLoad() {
  if (window.ecoSB) { load().catch(console.error); }
  else { setTimeout(waitAndLoad, 50); }
})();
</script>

<script src="theme-selector.js"></script>
</body>
