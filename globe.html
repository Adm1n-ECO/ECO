<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EternalCurrent — Family Network</title>
<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="eco-client.js"></script>
<style>
:root {
  --bg:#080D14;--bg-2:#0D1520;--bg-3:#111C2A;--bg-p:rgba(8,13,20,0.95);
  --blue:#00AAFF;--green:#00CC44;--white:#FFF;
  --muted:rgba(255,255,255,0.45);--dim:rgba(255,255,255,0.18);
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.14);
  --pw:360px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--white);font-family:Arial,Helvetica,sans-serif;overflow:hidden}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:1000;transition:opacity .8s}
#loading.out{opacity:0;pointer-events:none}
.lwm{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-size:42px;letter-spacing:-.02em}
.lwm .e{color:var(--blue)}.lwm .c{color:var(--green)}.lwm .o{color:var(--white)}
.lbw{width:200px;height:2px;background:var(--border-2);border-radius:2px;overflow:hidden}
.lb{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));width:0%;border-radius:2px;transition:width .4s}
.lt{font-size: 12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
#gc{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab}
#gc:active{cursor:grabbing}
#wm{display:none}
#wm .e{color:var(--blue)}#wm .c{color:var(--green)}#wm .o{color:var(--white)}
#stats{position:fixed;top:70px;left:50%;transform:translateX(-50%);display:flex;gap:28px;z-index:100;pointer-events:none}
.sn{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-size:20px;letter-spacing:-.02em;line-height:1;text-align:center}
.sn.b{color:var(--blue)}.sn.g{color:var(--green)}.sn.w{color:var(--white)}
.sl{font-size: 12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center}
#ctrl{position:fixed;top:70px;right:24px;display:flex;gap:8px;z-index:100}
.cb{background:var(--bg-p);border:1px solid var(--border-2);color:var(--white);font-family:Arial,sans-serif;font-size: 12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 14px;border-radius:6px;cursor:pointer;transition:all .15s;backdrop-filter:blur(12px)}
.cb:hover{border-color:var(--blue);color:var(--blue)}
.cb.on{border-color:var(--blue);color:var(--blue);background:rgba(0,170,255,.1)}
.cb.si{background:var(--blue);color:var(--bg);border-color:var(--blue)}
.cb.si:hover{background:#33BBFF}
#leg{position:fixed;bottom:28px;left:28px;display:flex;flex-direction:column;gap:6px;z-index:100;pointer-events:none}
.li{display:flex;align-items:center;gap:8px}
.ld{width:8px;height:8px;border-radius:50%}
.ll{font-size: 12px;color:var(--muted)}
#pp{position:fixed;background:var(--bg-p);border:1px solid var(--border-2);border-radius:10px;padding:14px 16px;min-width:180px;max-width:240px;z-index:200;display:none;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.6)}
#ppn{font-size: 12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.ppi{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;border-bottom:1px solid var(--border);transition:color .15s}
.ppi:last-child{border-bottom:none}
.ppi:hover{color:var(--blue)}
.ppd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ppname{font-size:13px;font-weight:700}
.ppsub{font-size: 12px;color:var(--muted)}
#pc{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-2);border:1px solid var(--border-2);border-radius:16px;padding:28px;width:320px;z-index:300;display:none;box-shadow:0 24px 64px rgba(0,0,0,.8)}
.pcx{position:absolute;top:14px;right:16px;font-size:18px;background:none;border:none;color:var(--muted);cursor:pointer;transition:color .15s}
.pcx:hover{color:var(--white)}
.pco{display:inline-block;font-size: 12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:14px}
.pcn{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-size:22px;letter-spacing:-.01em;margin-bottom:4px}
.pcnn{font-size:13px;color:var(--muted);margin-bottom:18px}
.pcf{margin-bottom:10px}
.pcfl{font-size: 12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.pcfv{font-size:13px}
.pcc{font-size:12px;color:var(--blue);cursor:pointer;margin-top:16px;font-weight:700}
.pcbp{width:100%;margin-top:14px;padding:10px;border-radius:8px;background:rgba(0,170,255,.1);border:1px solid rgba(0,170,255,.3);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:Arial,sans-serif}
.pcbp:hover{background:rgba(0,170,255,.2)}
.pcbc{width:100%;margin-top:8px;padding:10px;border-radius:8px;background:var(--green);border:none;color:var(--bg);font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;font-family:"Arial Black",Arial,sans-serif}
.pcbc:hover{background:#33DD66}
.pcpn{font-size:12px;color:var(--muted);font-style:italic;margin-top:12px;line-height:1.6}
.sp{position:fixed;top:54px;right:0;width:var(--pw);height:calc(100% - 54px);background:var(--bg-p);border-left:1px solid var(--border-2);z-index:200;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;backdrop-filter:blur(20px);overflow-y:auto}
.sp.open{transform:translateX(0)}
.ph{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.pt{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-size:13px;letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.px{font-size:18px;background:none;border:none;color:var(--muted);cursor:pointer;transition:color .15s}
.px:hover{color:var(--white)}
#ds{width:100%;background:var(--bg-3);border:1px solid var(--border-2);border-radius:8px;padding:9px 14px;color:var(--white);font-family:Arial,sans-serif;font-size:13px;outline:none;transition:border-color .2s}
#ds:focus{border-color:var(--blue)}
#ds::placeholder{color:var(--dim)}
#dl{flex:1;overflow-y:auto;padding:8px 0}
#dl::-webkit-scrollbar{width:3px}
#dl::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}
.di{padding:10px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.di:hover{background:rgba(255,255,255,.04)}
.dod{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.din{flex:1;min-width:0}
.dn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dk{font-size: 12px;color:var(--muted)}
.dloc{font-size: 12px;color:var(--dim)}
.dpast{opacity:.5}
.ct{display:flex;gap:6px;margin-top:10px}
.ctb{flex:1;padding:7px 8px;background:var(--bg-3);border:1px solid var(--border-2);border-radius:6px;color:var(--muted);font-family:Arial,sans-serif;font-size: 12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center}
.ctb.on{border-color:var(--blue);color:var(--blue);background:rgba(0,170,255,.08)}
#cw{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
#csv{width:100%;height:100%}
#aim{position:fixed;inset:0;background:rgba(8,13,20,.85);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#aim.open{display:flex}
#aib{background:var(--bg-2);border:1px solid var(--border-2);border-radius:20px;width:420px;max-width:calc(100vw - 40px);padding:32px;box-shadow:0 32px 80px rgba(0,0,0,.8);position:relative}
.aiwm{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-size:18px;margin-bottom:20px}
.aiwm .e{color:var(--blue)}.aiwm .c{color:var(--green)}.aiwm .o{color:var(--white)}
.aibbl{background:var(--bg-3);border:1px solid var(--border);border-radius:12px;border-top-left-radius:4px;padding:14px 16px;font-size:14px;line-height:1.7;color:var(--color-text);margin-bottom:16px;min-height:60px}
.aiir{display:flex;gap:8px;align-items:center}
.aiinp{flex:1;background:var(--bg-3);border:1px solid var(--border-2);border-radius:8px;padding:11px 14px;color:var(--white);font-family:Arial,sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.aiinp:focus{border-color:var(--blue)}
.aiinp::placeholder{color:var(--dim)}
.aisd{background:var(--blue);border:none;width:40px;height:40px;border-radius:8px;color:var(--bg);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.aisd:hover{background:#33BBFF}
.aicl{position:absolute;top:16px;right:18px;font-size:18px;background:none;border:none;color:var(--muted);cursor:pointer;transition:color .15s}
.aicl:hover{color:var(--white)}
.aiski{margin-top:14px;text-align:center;font-size: 12px;color:var(--dim);cursor:pointer;transition:color .15s}
.aiski:hover{color:var(--muted)}
.ait{display:flex;gap:4px;align-items:center;padding:4px 0}
.ait span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:bnc 1.2s infinite}
.ait span:nth-child(2){animation-delay:.2s}
.ait span:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-6px);opacity:1}}
#ovl{position:fixed;inset:0;z-index:150;display:none}
#ovl.on{display:block}

/* ── MOBILE BOTTOM SHEET ── */
@media(max-width:700px){
  /* Stats bar — compact horizontal strip at top */
  #stats{top:56px;gap:14px;font-size: 12px;}
  .sn{font-size:1rem!important;}
  .sl{font-size: 12px!important;}

  /* Controls — bottom row instead of top-right */
  #ctrl{top:auto;right:auto;bottom:0;left:0;right:0;width:100%;
    display:flex;justify-content:center;gap:8px;padding:12px 16px 20px;
    background:linear-gradient(to top,rgba(8,13,20,.95) 60%,transparent);
    z-index:200;}
  .cb{flex:1;max-width:160px;padding:11px 8px;font-size: 12px;}

  /* Side panels → bottom sheets */
  .sp{top:auto;right:0;left:0;width:100%!important;
    height:62vh;border-left:none;border-top:1px solid var(--border-2);
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);}
  .sp.open{transform:translateY(0);}

  /* Bottom sheet drag handle */
  .sp::before{content:'';display:block;width:36px;height:4px;
    border-radius:2px;background:rgba(255,255,255,.2);
    margin:10px auto 0;flex-shrink:0;}

  /* Panel header */
  .ph{padding:12px 20px 10px;}
  .pt{font-size:12px;}

  /* Member card panel — centered modal on mobile */
  #pc{width:92vw;padding:20px;top:50%;left:50%;}

  /* Legend — move up above controls */
  #leg{bottom:72px;left:16px;}

  /* Backdrop for bottom sheet */
  .sp.open~#mobile-backdrop{display:block;}
  #mobile-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;}
}
</style>
</head>
<body>
<div id="mobile-backdrop" onclick="closeMobileSheets()"></div>
<div id="eco-header"></div>

<div id="loading">
  <div class="lwm"><span class="e">E</span><span class="c">C</span><span class="o">O</span></div>
  <div class="lbw"><div class="lb" id="lb"></div></div>
  <div class="lt" id="lt">Connecting to your family…</div>
</div>
<canvas id="gc"></canvas>
<a href="home.html" id="wm" style="text-decoration:none;pointer-events:all;"><span class="e">E</span><span class="c">C</span><span class="o">O</span></a>
<div id="stats">
  <div><div class="sn b" id="sm">—</div><div class="sl">Members</div></div>
  <div><div class="sn g" id="sa">—</div><div class="sl">Journeys</div></div>
  <div><div class="sn w" id="sc">—</div><div class="sl">Countries</div></div>
  <div><div class="sn" style="color:#00CC44" id="sl">—</div><div class="sl">Languages</div></div>
</div>
<div id="ctrl">
  <button class="cb" id="bd" onclick="tpanel('dir')">Network</button>
  <button class="cb" id="bc" onclick="tpanel('chord')">Connections</button>
  <button class="cb" id="bexp" onclick="exportGlobe()" title="Save as image">⬇ Share</button>
</div>
<script></script>
<div id="leg"></div>
<div id="pp"><div id="ppn"></div><div id="ppl"></div></div>
<div id="pc">
  <button class="pcx" onclick="cpc()">×</button>
  <div id="pco" class="pco"></div>
  <div id="pcn"  class="pcn"></div>
  <div id="pcnn" class="pcnn"></div>
  <div id="pcb"  class="pcf"></div>
  <div id="pccl" class="pcf"></div>
  <div id="pcr"  class="pcf"></div>
  <div id="pcco" class="pcc"></div>
  <div id="pca"></div>
</div>
<div class="sp" id="dsp">
  <div class="ph">
    <div class="pt">Network<button class="px" onclick="tpanel('dir')">×</button></div>
    <input id="ds" placeholder="Search by name…" oninput="fdir(this.value)">
  </div>
  <div id="dl"></div>
</div>
<div class="sp" id="csp">
  <div class="ph">
    <div class="pt">Connections<button class="px" onclick="tpanel('chord')">×</button></div>
    <div class="ct">
      <button class="ctb on" id="tb" onclick="scv('branch')">Relationship Types</button>
      <button class="ctb"    id="to" onclick="scv('origin')">Cultural Origin</button>
    </div>
  </div>
  <div id="cw"><svg id="csv"></svg></div>
</div>
<div id="aim">
  <div id="aib">
    <button class="aicl" onclick="cai()">×</button>
    <div class="aiwm"><span class="e">E</span><span class="c">C</span><span class="o">O</span></div>
    <div class="aibbl" id="aibbl"><div class="ait"><span></span><span></span><span></span></div></div>
    <div class="aiir" id="aiir">
      <input class="aiinp" id="aiinp" placeholder="Type your answer…" onkeydown="if(event.key==='Enter')aisend()">
      <button class="aisd" onclick="aisend()">→</button>
    </div>
    <div class="aiski" id="aisk" onclick="cai()">Skip for now — just looking around</div>
  </div>
</div>
<div id="ovl" onclick="call()"></div>
<script>
// ============ CONFIG ============

const ACOL = { India:0xFFB347, Fiji:0x00CED1, Pakistan:0x9B59B6, USA:0x44DD88, UK:0xFF6B6B, Canada:0xFF8C42, Australia:0x00D4AA, Kenya:0xF7DC6F, def:0x888888 };
const OCSS = { India:'#FFB347', Fiji:'#00CED1', Pakistan:'#9B59B6', USA:'#44DD88', UK:'#FF6B6B', Canada:'#FF8C42', Australia:'#00D4AA', Kenya:'#F7DC6F', def:'#888888' };
// Extended palette for dynamic origins not in OCSS
const DYN_PAL = ['#FFB347','#00CED1','#9B59B6','#44DD88','#FF6B6B','#FF8C42','#00D4AA','#F7DC6F','#82E0AA','#AED6F1','#D7BDE2','#F0B27A','#A9CCE3','#A3E4D7'];
function getOriginColor(origin) { return OCSS[origin] || DYN_PAL[Math.abs([...origin].reduce((a,c)=>a+c.charCodeAt(0),0)) % DYN_PAL.length]; }
function getOriginColorHex(origin) { const c=getOriginColor(origin); return parseInt(c.replace('#',''),16); }

// ============================================================
// DEV MODE — REMOVE BEFORE LAUNCH
// Bypasses Supabase magic link email for local testing.
// Two accounts:
//   admin@eternalcurrent.online  → SuperUser  (platform admin)
//   vikas@eternalcurrent.online  → STAR       (lightning-001 user test)
// To disable: set DEV_MODE = false
// ============================================================
const DEV_MODE = false;

const DEV_ACCOUNTS = {
  admin: { user_id:'ADMIN', email:'admin@eternalcurrent.online', platform_role:'SuperUser',  network_id:null,          display:'Admin' },
  vikas: { user_id:'STAR',  email:'vikas@eternalcurrent.online', platform_role:'NetworkOwner', network_id:'lightning-001', display:'Vikas (STAR)' }
};

// Active session — null until logged in (or dev bypass used)
// Shape: { user_id, email, platform_role, network_id }
let ECO_SESSION = null;

function devLogin(account) {
  ECO_SESSION = DEV_ACCOUNTS[account];
  // Globe focus: use session user's current location, fallback to US center
  const u = DB.users.find(x => x.user_id === ECO_SESSION.user_id);
  const lat = u?.current_lat ?? 39.5;
  const lon = u?.current_lon ?? -98.35;
  if (GLOBE.gg) {
    GLOBE.gg.rotation.y = -Math.PI/2 - lon * Math.PI/180;
    GLOBE.gg.rotation.x = Math.max(-1.2, Math.min(1.2, lat * Math.PI/180 * 0.6));
  }
  document.getElementById('dev-panel').style.display = 'none';
  document.getElementById('dev-badge').textContent = '⚡ DEV: ' + ECO_SESSION.display;
  document.getElementById('dev-badge').style.display = 'block';
  console.log('[DEV] Session set:', ECO_SESSION);
  // Re-fetch kinship terms for the new focal
  loadKinship();
}
// ============================================================
// END DEV MODE
// ============================================================

// ============ STATE ============
const DB = { users:[], rels:[], clusters:{}, arcs:[], kinship:{} };
// DB.kinship = { user_id: 'Bhanji' } — populated by loadKinship() per session
let AP = null; // active panel
let CV = 'branch'; // chord view
let AS = { step:0, mode:'claim', ctx:{} }; // AI state
let isDrag=false, dragDelta=0, dragSt={x:0,y:0}, rotSt={x:0,y:0};
let hovered=null, autoRot=true;
let GLOBE={};

// ============ SUPABASE ============
const eco = window.ecoSB || supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function loadData() {
  sl(10,'Loading family…');
  const {data:u} = await eco.from('users_public')
    .select('user_id,full_name,first_name,nickname,status,cultural_origin,birth_location,current_location,birth_lat,birth_lon,current_lat,current_lon,languages_spoken')
    .eq('network_id','lightning-001');
  const {data:r} = await eco.from('relationships')
    .select('subject_id,target_id,relation_type,branch')
    .eq('network_id','lightning-001')
    .limit(2000);
  DB.users = u||[]; DB.rels = r||[];

  // Build legend dynamically from actual cultural_origin values
  buildLegend();


  DB.clusters={};
  DB.users.forEach(u=>{
    if(!u.current_lat||!u.current_lon)return;
    const k=`${Math.round(u.current_lat*10)/10},${Math.round(u.current_lon*10)/10}`;
    if(!DB.clusters[k])DB.clusters[k]={lat:u.current_lat,lon:u.current_lon,loc:u.current_location,users:[]};
    DB.clusters[k].users.push(u);
  });

  // Arcs: different birth vs current
  DB.arcs=DB.users.filter(u=>u.birth_lat&&u.birth_lon&&u.current_lat&&u.current_lon&&
    !(Math.abs(u.birth_lat-u.current_lat)<0.15&&Math.abs(u.birth_lon-u.current_lon)<0.15));

  const ctry=new Set(DB.users.filter(u=>u.birth_location).map(u=>u.birth_location.split(',').pop().trim()));
  const langs=new Set(DB.users.flatMap(u=>u.languages_spoken||[]));
  document.getElementById('sm').textContent=DB.users.length;
  document.getElementById('sa').textContent=DB.arcs.length;
  document.getElementById('sc').textContent=ctry.size;
  document.getElementById('sl').textContent=langs.size||'—';
}

// ============ KINSHIP ============
// Fetches all kinship terms from Postgres get_all_kinship() RPC.
// Called once after login — re-called when session switches.
async function loadKinship() {
  const focal = ECO_SESSION?.user_id || 'STAR';
  const { data, error } = await eco.rpc('get_all_kinship', {
    p_focal_id: focal,
    p_language: 'Hindi'
  });
  if (error) { console.warn('[ECO] Kinship load failed:', error.message); return; }
  DB.kinship = {};
  (data || []).forEach(r => { DB.kinship[r.user_id] = r.kinship_term; });
  // Refresh directory labels after kinship loads
  bdir();
}

// ============ GLOBE ============
function initGlobe(){
  const canvas=document.getElementById('gc');
  const W=canvas.clientWidth=window.innerWidth;
  const H=canvas.clientHeight=window.innerHeight;
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(45,W/H,0.1,100);
  cam.position.z=2.8;
  const ren=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
  window._ecoRen=ren;
  window._ecoScene=scene;
  window._ecoCam=cam;
  ren.setSize(W,H); ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.setClearColor(0x080D14,1);

  // Stars
  const sg=new THREE.BufferGeometry();
  const sa=[];
  for(let i=0;i<3000;i++)sa.push((Math.random()-.5)*60,(Math.random()-.5)*60,(Math.random()-.5)*60);
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sa,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.05,transparent:true,opacity:.6})));

  // Globe group
  const gg=new THREE.Group();
  scene.add(gg);

  // Earth mesh
  const eg=new THREE.SphereGeometry(1,64,64);
  const em=new THREE.MeshPhongMaterial({shininess:8,color:0x335577});
  const tl=new THREE.TextureLoader();
  tl.load('/textures/earth_daymap.jpg',t=>{
    t.wrapS=t.wrapT=THREE.RepeatWrapping;
    em.map=t; em.color.set(0xffffff); em.needsUpdate=true;
  },undefined,()=>console.warn('earth_daymap.jpg missing — showing color fallback'));
  tl.load('/textures/earth_normalmap.jpg',t=>{
    em.normalMap=t; em.normalScale.set(.7,.7); em.needsUpdate=true;
  });
  gg.add(new THREE.Mesh(eg,em));

  // Atmosphere shader
  gg.add(new THREE.Mesh(new THREE.SphereGeometry(1.08,32,32),new THREE.ShaderMaterial({
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vN;void main(){float i=pow(.55-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(0.,.65,1.,1.)*i;}`,
    side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true
  })));

  // Lighting
  scene.add(new THREE.AmbientLight(0xffffff,.5));
  const sun=new THREE.DirectionalLight(0xffffff,1.0); sun.position.set(5,3,5); scene.add(sun);

  // Orient: Pacific facing camera shows both California + South Asia
  // Default orientation — will be overridden by centerOnUser() after init
  gg.rotation.y = 0.146; gg.rotation.x = 0.18; // US center

  // Arcs
  sl(78,'Drawing migration arcs…');
  const ag=new THREE.Group(); gg.add(ag);
  DB.arcs.forEach(u=>{
    const col=getOriginColorHex(u.cultural_origin||'Unknown');
    const arc=mkArc(u.birth_lat,u.birth_lon,u.current_lat,u.current_lon,col,u.status==='Passed');
    if(arc)ag.add(arc);
  });

  // Dots (clustered)
  sl(88,'Placing family members…');
  const dg=new THREE.Group(); gg.add(dg);
  const dots=[];
  Object.values(DB.clusters).forEach(cl=>{
    const passed=cl.users.every(u=>u.status==='Passed');
    const origin=cl.users.find(u=>u.cultural_origin)?.cultural_origin;
    const col=getOriginColorHex(origin||'Unknown');
    const r=0.009+Math.sqrt(cl.users.length)*0.003;
    const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:passed?.5:.92});
    const dot=new THREE.Mesh(new THREE.SphereGeometry(r,10,10),mat);
    const pos=ll2v(cl.lat,cl.lon,1.012); dot.position.copy(pos); dot.userData={cl};
    if(!passed){
      const gm=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.12});
      const gd=new THREE.Mesh(new THREE.SphereGeometry(r*2,10,10),gm);
      gd.position.copy(pos); dg.add(gd);
    }
    dg.add(dot); dots.push(dot);
  });

  // Raycaster
  const rc=new THREE.Raycaster();
  const mv=new THREE.Vector2();
  canvas.addEventListener('mousemove',e=>{
    mv.x=(e.clientX/innerWidth)*2-1;
    mv.y=-(e.clientY/innerHeight)*2+1;
    rc.setFromCamera(mv,cam);
    const hits=rc.intersectObjects(dots);
    canvas.style.cursor=hits.length?'pointer':(isDrag?'grabbing':'grab');
    hovered=hits.length?hits[0].object:null;
  });
  canvas.addEventListener('click',e=>{
    if(dragDelta>4)return;
    if(!hovered){cpp();return;}
    spop(hovered.userData.cl,e.clientX,e.clientY);
  });

  // Drag rotate
  canvas.addEventListener('mousedown',e=>{
    isDrag=true; dragDelta=0;
    dragSt={x:e.clientX,y:e.clientY};
    rotSt={x:gg.rotation.y,y:gg.rotation.x};
    autoRot=false;
    clearTimeout(rotRestartTimer);
    showRotBtn(true);
  });
  window.addEventListener('mousemove',e=>{
    if(!isDrag)return;
    dragDelta=Math.max(dragDelta,Math.abs(e.clientX-dragSt.x)+Math.abs(e.clientY-dragSt.y));
    gg.rotation.y=rotSt.x+(e.clientX-dragSt.x)*.006;
    gg.rotation.x=rotSt.y+(e.clientY-dragSt.y)*.006;
    gg.rotation.x=Math.max(-1.2,Math.min(1.2,gg.rotation.x));
  });
  window.addEventListener('mouseup',()=>{
    isDrag=false;
    clearTimeout(rotRestartTimer);
    rotRestartTimer=setTimeout(restartRot, 8000);
  });

  // Touch
  let lt=null;
  canvas.addEventListener('touchstart',e=>{
    lt={x:e.touches[0].clientX,y:e.touches[0].clientY};
    rotSt={x:gg.rotation.y,y:gg.rotation.x}; dragDelta=0; autoRot=false;
    clearTimeout(rotRestartTimer);
    showRotBtn(true);
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(!lt)return;
    const dx=e.touches[0].clientX-lt.x,dy=e.touches[0].clientY-lt.y;
    dragDelta+=Math.abs(dx)+Math.abs(dy);
    gg.rotation.y+=dx*.006; gg.rotation.x+=dy*.006;
    gg.rotation.x=Math.max(-1.2,Math.min(1.2,gg.rotation.x));
    lt={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});
  canvas.addEventListener('touchend',()=>{
    lt=null;
    clearTimeout(rotRestartTimer);
    rotRestartTimer=setTimeout(restartRot, 8000);
  },{passive:true});

  // Scroll zoom
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    cam.position.z=Math.max(1.6,Math.min(5.0,cam.position.z+e.deltaY*.001));
  },{passive:false});

  // Resize
  window.addEventListener('resize',()=>{
    cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
    ren.setSize(innerWidth,innerHeight);
  });

  // Double-click anywhere on globe to restart rotation
  canvas.addEventListener('dblclick', ()=>restartRot());

  // Animate
  (function loop(){
    requestAnimationFrame(loop);
    if(autoRot&&!isDrag)gg.rotation.y+=.0008;
    ren.render(scene,cam);
  })();

  GLOBE={scene,cam,ren,gg};
}

// ============ GEO HELPERS ============
function ll2v(lat,lon,r=1){
  const p=(90-lat)*Math.PI/180, t=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}

function mkArc(la1,lo1,la2,lo2,col,passed){
  try{
    const v1=ll2v(la1,lo1,1.005),v2=ll2v(la2,lo2,1.005);
    const d=v1.clone().normalize().dot(v2.clone().normalize());
    const dist=Math.acos(Math.min(1,Math.max(-1,d)));
    const h=1.0+dist*.6;
    const mid=v1.clone().add(v2).multiplyScalar(.5).normalize().multiplyScalar(h);
    const tg=new THREE.TubeGeometry(new THREE.QuadraticBezierCurve3(v1,mid,v2),48,.0028,6,false);
    return new THREE.Mesh(tg,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:passed?.3:.72}));
  }catch(e){return null;}
}

// ============ CHORD DIAGRAM ============
function bchord(view){
  const svg=document.getElementById('csv'),wrap=document.getElementById('cw');
  const size=Math.min(wrap.clientWidth,wrap.clientHeight)-20;
  const outer=size/2, inner=outer-28;
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  svg.setAttribute('viewBox',`${-outer} ${-outer} ${size} ${size}`);

  let groups,matrix,colors;
  if(view==='branch'){
    // Group by relation_type tier: Core / Extended / In-Law / Other
    const TYPE_GROUP = {
      Parent:'Core Family', Child:'Core Family', Spouse:'Core Family', Partner:'Core Family',
      Sibling:'Core Family', Grandparent:'Core Family', Grandchild:'Core Family',
      AuntUncle:'Extended', NieceNephew:'Extended', Cousin:'Extended',
      Friend:'Other', Colleague:'Other'
    };
    const BRANCH_PAL = {'Core Family':'#00AAFF','Extended':'#00CC44','In-Law':'#FFB347','Other':'#9B59B6'};
    const allGroups = ['Core Family','Extended','In-Law','Other'];
    groups = allGroups;
    matrix = allGroups.map(()=>allGroups.map(()=>0));
    const um={}; DB.users.forEach(u=>{um[u.user_id]=u;});
    DB.rels.forEach(r=>{
      const rt = r.relation_type||'Other';
      const g1 = TYPE_GROUP[rt] || (rt.toLowerCase().includes('law')?'In-Law':'Other');
      // Use cultural origin to color the other side
      const u2 = um[r.target_id];
      const g2 = u2 ? (TYPE_GROUP[rt]||'Other') : 'Other';
      const i=allGroups.indexOf(g1), j=allGroups.indexOf(g2);
      if(i<0||j<0)return;
      if(i===j) matrix[i][i]++;
      else { matrix[i][j]++; matrix[j][i]++; }
    });
    colors = allGroups.map(g=>BRANCH_PAL[g]);
  }else{
    // Dynamic: derive origin list from actual data
    const ol = [...new Set(DB.users.map(u=>u.cultural_origin||'Unknown').filter(Boolean))].sort();
    if(!ol.includes('Unknown')) ol.push('Unknown');
    groups=ol; matrix=ol.map(()=>ol.map(()=>0));
    const um={};DB.users.forEach(u=>{um[u.user_id]=u;});
    DB.rels.forEach(r=>{
      const u1=um[r.subject_id],u2=um[r.target_id];
      if(!u1||!u2)return;
      const o1=u1.cultural_origin||'Unknown', o2=u2.cultural_origin||'Unknown';
      const i=ol.indexOf(o1), j=ol.indexOf(o2);
      if(i<0||j<0)return;
      matrix[i][j]++; if(i!==j)matrix[j][i]++;
    });
    colors=ol.map(o=>getOriginColor(o));
  }

  // Filter empty
  const ne=groups.map((_,i)=>matrix[i].some(v=>v>0)?i:-1).filter(i=>i>=0);
  if(ne.length<2){
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('text-anchor','middle');t.setAttribute('y','6');
    t.setAttribute('fill','rgba(255,255,255,0.3)');t.setAttribute('font-size','13');
    t.textContent='Not enough data yet';svg.appendChild(t);return;
  }
  const fg=ne.map(i=>groups[i]),fc=ne.map(i=>colors[i]),fm=ne.map(i=>ne.map(j=>matrix[i][j]));
  const chord=d3.chord().padAngle(.04).sortSubgroups(d3.descending)(fm);
  const arc=d3.arc().innerRadius(inner).outerRadius(outer);
  const rib=d3.ribbon().radius(inner);
  const g=d3.select(svg);
  g.append('g').attr('fill-opacity',.5).selectAll('path').data(chord).join('path')
    .attr('d',rib).style('fill',d=>fc[d.target.index])
    .style('stroke',d=>d3.color(fc[d.target.index]).darker()).style('stroke-width','.5');
  const grp=g.append('g').selectAll('g').data(chord.groups).join('g');
  grp.append('path').style('fill',d=>fc[d.index]).style('stroke',d=>d3.color(fc[d.index]).darker())
    .style('stroke-width','.5').attr('d',arc);
  grp.append('text').each(d=>{d.angle=(d.startAngle+d.endAngle)/2;})
    .attr('dy','.35em')
    .attr('transform',d=>`rotate(${d.angle*180/Math.PI-90}) translate(${outer+8}) ${d.angle>Math.PI?'rotate(180)':''}`)
    .attr('text-anchor',d=>d.angle>Math.PI?'end':null)
    .text(d=>fg[d.index])
    .style('fill','rgba(255,255,255,.7)').style('font-size','9px')
    .style('font-family','Arial,sans-serif').style('letter-spacing','.04em');
}

  CV=v;
  document.getElementById('tb').classList.toggle('on',v==='branch');
  document.getElementById('to').classList.toggle('on',v==='origin');
  bchord(v);

  const v=inp.value.trim(); if(!v)return; inp.value='';
  AS.hist.push({role:'user',content:v});
  taim(aiLogic(v));
}
function aiLogic(v){
  const vl=v.toLowerCase();
  const {mode,step}=AS;
  if(mode==='claim'){
    if(step===0){
      const ms=DB.users.filter(u=>u.status!=='Passed'&&(
        u.full_name.toLowerCase().includes(vl)||
        (u.first_name&&u.first_name.toLowerCase().includes(vl))||
        (u.nickname&&u.nickname.toLowerCase().includes(vl))));
      if(!ms.length){AS.step='new';return "We don't have you in here yet — but that's easy to fix. How are you connected to this family?";}
      if(ms.length===1){
        AS.ctx.m=ms[0]; AS.step='confirm';
        const u=ms[0];
        const id=u.nickname||`the ${u.first_name} from ${(u.birth_location||'').split(',')[0]}`;
        return `Are you ${id}?`;
      }
      AS.ctx.ms=ms; AS.step='disambig';
      return `We found a few people with that name:\n${ms.map(u=>`• ${u.full_name}${u.birth_location?' from '+u.birth_location.split(',')[0]:''}`).join('\n')}\n\nWhich one are you?`;
    }
    if(step==='disambig'){
      const m=AS.ctx.ms.find(u=>u.full_name.toLowerCase().includes(vl)||(u.nickname&&u.nickname.toLowerCase().includes(vl)));
      if(m){AS.ctx.m=m;AS.step='confirm';const id=m.nickname||m.first_name;return `Are you ${id}?`;}
      return "Try your nickname or the city you grew up in.";
    }
    if(step==='confirm'){
      if(vl.includes('yes')||vl.includes('yeah')||vl.includes('that')||vl.includes('correct')){
        const u=AS.ctx.m; AS.step='langs';
        return `Welcome${u.nickname?', '+u.nickname:''}. Quick question before we save your spot — what languages do you speak? (e.g. English, Hindi, Fijian Hindi)`;
      }
      AS.step=0; return "No problem. Try your nickname or the city you grew up in and we'll find you.";
    }
    if(step==='langs'){
      // Store languages answer, move to email
      AS.ctx.langs=v; AS.step='email';
      return `Perfect. To save your story and come back any time — what email should we send your link to?`;
    }
    if(step==='email'){
      AS.ctx.email=v; AS.step='done';
      document.getElementById('aiir').style.display='none';
      // Save languages to user profile
      if(AS.ctx.m && AS.ctx.langs){
        const langs = AS.ctx.langs.split(/[,;\/]+/).map(l=>l.trim()).filter(Boolean);
        eco.from('users').update({languages_spoken: langs})
          .eq('user_id', AS.ctx.m.user_id).then(()=>{});
      }
      // Send magic link
      eco.auth.signInWithOtp({ email: v, options: { emailRedirectTo: 'https://eternalcurrent.online/user.html' } });
      return `Your link is on its way to ${v}. Check your inbox — one click and you're in. Your family is glad you're here.`;
    }
    if(step==='new'){AS.ctx.conn=v;AS.step='new-email';return "Got it. What's your email? Vikas will add you shortly and we'll send your link.";}
    if(step==='new-email'){
      document.getElementById('aiir').style.display='none';
      // Save waitlist request to network_questions table as a system question
      eco.from('network_questions').insert({
        network_id:'lightning-001',
        asked_by_name:'Globe Visitor',
        question:`NEW MEMBER REQUEST: "${AS.ctx.conn}" — email: ${v}`,
        is_public: false
      }).then(()=>{});
      return `You're on your way in. We'll send your link to ${v} once you've been added.`;
    }
  }
  if(mode==='signin'||mode==='persp'){
    document.getElementById('aiir').style.display='none';
    eco.auth.signInWithOtp({ email: v, options: { emailRedirectTo: 'https://eternalcurrent.online/user.html' } });
    return `Link sent to ${v}. Check your inbox — one click and you're in.`;
  }
  return "Tell me your name and I'll find you.";
}

// ============ CLOSE ALL ============
function call(){cpp();cpc();cai();if(AP)tpanel(AP);document.getElementById('ovl').classList.remove('on');}

// ============ LOAD BAR ============
function sl(p,m){document.getElementById('lb').style.width=p+'%';document.getElementById('lt').textContent=m;}

// ============ INIT ============
async function init(){
  try{
    await loadData();
    sl(75,'Building globe…');
    initGlobe();
    // Center on logged-in user's location
    (async () => {
      try {
        const { data:{ session } } = await eco.auth.getSession();
        let lat = 39.5, lon = -98.35;
        if (session?.user) {
          const { data: profile } = await eco.from('users')
            .select('current_lat,current_lon')
            .eq('email', session.user.email)
            .maybeSingle();
          if (profile?.current_lat && profile?.current_lon) {
            lat = profile.current_lat; lon = profile.current_lon;
          }
        }
        if (GLOBE.gg) {
          GLOBE.gg.rotation.y = -Math.PI/2 - lon * Math.PI/180;
          GLOBE.gg.rotation.x = Math.max(-1.2, Math.min(1.2, lat * Math.PI/180 * 0.6));
        }
      } catch(e) {
        if (GLOBE.gg) { GLOBE.gg.rotation.y = 0.146; GLOBE.gg.rotation.x = 0.18; }
      }
    })();
    sl(92,'Building directory…');
    bdir();
    sl(98,'Loading kinship terms…');
    await loadKinship();
    sl(100,'Ready');
    setTimeout(()=>{
      const ld=document.getElementById('loading');
      ld.classList.add('out');
      setTimeout(()=>ld.style.display='none',900);
      autoRot=true;
    },500);
  }catch(e){
    console.error('ECO init error:',e);
    document.getElementById('lt').textContent='Connection error — check console';
  }
}
init();
</script>
